<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA meta -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SmartCampus" />
    <meta name="description" content="Track lectures, assignments, and credits from one focused campus dashboard." />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icon (uses our generated 192px icon) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <title>Smart Campus</title>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>

<!-- Register service worker for PWA / offline support -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker
                .register('/sw.js')
                .catch(err => console.warn('SW registration failed:', err))
        })
    }
</script>
</body>
</html>
